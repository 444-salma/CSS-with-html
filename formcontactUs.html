<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="Description"
      content="form to contact us for any questions or suggestions"
    />

    <title>Contact Us</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <header>
    <h1> Almadrasa High School</h1>
    
        <ul>
            <li ><a href="content.html" targent="_blank" >Home </a></li>
            
            <li> <a href="ClassSchedule.html" targent="_blank" >Class Schedule </a></li>
            
            <li><a href="formcontactUs.html" targent="_blank" >Contact Us </a></li>
        </ul>
    
</header>
<main>
    <h2>Contact Us</h2>
   <form>
    <fieldset>
        <legend>Your information</legend>
        <br/>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required  placeholder="example@gmail.com"/>
        <label for="reason">Reason for Contact:</label>
        <select id="reas" name="reason" type="text"></select>
        <option value="">Select a Reason</option>
            <option value="general">General Inquiry</option>
            <option value="admission">Admission information</option>
            <option value="event">School Events</option>
             <option value="other">Other</option>
        </select>
    </fieldset>
    <fieldset>
    <legend>Message</legend>
    <br/>
    <label for="subject">Subject:</label>
    <input type="text" id="subject" name="subject" />
    <label for="message">Your Message:</label>
    <textarea id="message" name="message" maxlength="500"></textarea>
    </fieldset>
    <fieldset>
        <legend>Preferences</legend>
        <br/>
        <p>Preferences Contact Method</p>
        <input type="radio" id="email" name="contact_method" value="email">
        <label for="email">Email</label>
        <input type="radio" id="phone" name="contact_method" value="phone"><br/>
        <label for="phone">Phone</label>
        <input type="checkbox" id="subscribe" name="subscribe" value="newsletter">
        <label for="subscribe">Subscribe to our newsletter</label>
    </fieldset>
    <button type="reset">Reset Form</button>
    <button type="submit">send message</button>
   </form>
   <footer>
    <p>&copy; 2026 Almadrasa High School</p>
   </footer>
  </body>

</html>
